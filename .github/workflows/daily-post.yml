name: Daily LinkedIn Post

on:
  schedule:
    # Runs at 03:30 UTC every day = 09:00 IST (Asia/Kolkata).
    # Adjust the UTC time below if you want a different local posting time.
    # UTC time = your local time minus your UTC offset (IST is UTC+5:30).
    - cron: "30 3 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab, for testing

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          LINKEDIN_API_VERSION: ${{ secrets.LINKEDIN_API_VERSION }}
        run: python main.py --now

      - name: Commit updated state (topic rotation + history)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json || true
          git diff --cached --quiet || git commit -m "Update posting state [skip ci]"
          git push || true
